name: Bug report
description: Report a reproducible problem with Bale Chat Tunnel.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Remove secrets, session files, public keys, and private logs before posting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps or commands that trigger the problem.
      placeholder: |
        1. Run ...
        2. Configure ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: App, CLI, or commit version.
      placeholder: "0.1.1"
    validations:
      required: false
  - type: dropdown
    id: role
    attributes:
      label: Affected side
      options:
        - client
        - relay
        - both
        - unknown
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04, Windows 11, Android ..."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant redacted logs.
      render: text
    validations:
      required: false
