name: Build

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: make pub-get
      - name: Run tests
        run: make test

  linux-app-x64:
    name: Linux app x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Install dependencies
        run: make pub-get
      - name: Build Linux app
        run: make build-linux-x64
      - name: Package Linux app
        run: tar -C build/linux/x64/release -czf bale-chat-tunnel-desktop-linux-x64.tar.gz bundle
      - name: Upload Linux app
        uses: actions/upload-artifact@v4
        with:
          name: bale-chat-tunnel-desktop-linux-x64
          path: bale-chat-tunnel-desktop-linux-x64.tar.gz

  windows-app-x64:
    name: Windows app x64
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install make
        shell: powershell
        run: choco install make -y
      - name: Install dependencies
        run: make pub-get
      - name: Build Windows app
        run: make build-windows-x64
      - name: Package Windows app
        shell: powershell
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath bale-chat-tunnel-desktop-windows-x64.zip
      - name: Upload Windows app
        uses: actions/upload-artifact@v4
        with:
          name: bale-chat-tunnel-desktop-windows-x64
          path: bale-chat-tunnel-desktop-windows-x64.zip

  linux-cli-x64:
    name: Linux CLI x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: make pub-get
      - name: Build Linux CLI
        run: make check-cli-linux-x64
      - name: Upload Linux CLI
        uses: actions/upload-artifact@v4
        with:
          name: bale-chat-tunnel-cli-linux-x64
          path: build/cli/btun-linux-x64

  windows-cli-x64:
    name: Windows CLI x64
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install make
        shell: powershell
        run: choco install make -y
      - name: Install dependencies
        run: make pub-get
      - name: Build Windows CLI
        run: make check-cli-windows-x64
      - name: Upload Windows CLI
        uses: actions/upload-artifact@v4
        with:
          name: bale-chat-tunnel-cli-windows-x64
          path: build/cli/btun-windows-x64.exe

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - test
      - linux-app-x64
      - windows-app-x64
      - linux-cli-x64
      - windows-cli-x64
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Linux app
        uses: actions/download-artifact@v4
        with:
          name: bale-chat-tunnel-desktop-linux-x64
          path: release
      - name: Download Windows app
        uses: actions/download-artifact@v4
        with:
          name: bale-chat-tunnel-desktop-windows-x64
          path: release
      - name: Download Linux CLI
        uses: actions/download-artifact@v4
        with:
          name: bale-chat-tunnel-cli-linux-x64
          path: release
      - name: Download Windows CLI
        uses: actions/download-artifact@v4
        with:
          name: bale-chat-tunnel-cli-windows-x64
          path: release
      - name: Rename CLI assets
        run: |
          mv release/btun-linux-x64 release/bale-chat-tunnel-cli-linux-x64
          mv release/btun-windows-x64.exe release/bale-chat-tunnel-cli-windows-x64.exe
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release/bale-chat-tunnel-cli-linux-x64 \
            release/bale-chat-tunnel-cli-windows-x64.exe \
            release/bale-chat-tunnel-desktop-linux-x64.tar.gz \
            release/bale-chat-tunnel-desktop-windows-x64.zip \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
